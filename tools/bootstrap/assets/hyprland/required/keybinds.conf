# Core Pro Desk Shell actions.
bind = Super, Space, exec, ~/.local/bin/pro-desk-shell-dispatch launcher.toggle
bind = Super, Tab, exec, ~/.local/bin/pro-desk-shell-dispatch overview.toggle
bind = Super, N, exec, ~/.local/bin/pro-desk-shell-dispatch notifications.toggle
bind = Super, B, exec, ~/.local/bin/pro-desk-shell-dispatch quick-settings.toggle
bind = Ctrl+Super, T, exec, ~/.local/bin/pro-desk-shell-dispatch wallpaper.toggle
bind = Ctrl+Alt, Delete, exec, ~/.local/bin/pro-desk-shell-dispatch session.toggle
bind = Super, L, exec, ~/.local/bin/pro-desk-shell-dispatch lock
bind = Ctrl+Super, R, exec, ~/.local/bin/pro-desk-shell-dispatch restart-shell
