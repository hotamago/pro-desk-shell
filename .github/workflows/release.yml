name: Release CI/CD

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Release Branch
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: fedora:43
    env:
      CCACHE_DISABLE: "1"
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install bootstrap runtime
        run: dnf install -y python3

      - name: Bootstrap Fedora dependencies
        run: ./devsh install --yes --deps-only

      - name: Run bootstrap tests
        run: python3 -m unittest discover -s tools/bootstrap/tests

      - name: Run Rust tests
        run: cargo test --locked --manifest-path rust/Cargo.toml

      - name: Validate debug build
        run: ./devsh build

  bundle:
    name: Build Release Bundle
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - validate
    container:
      image: fedora:43
    env:
      CCACHE_DISABLE: "1"
      CARGO_TERM_COLOR: always
    outputs:
      tag_name: ${{ steps.metadata.outputs.tag_name }}
      release_name: ${{ steps.metadata.outputs.release_name }}
      archive_name: ${{ steps.metadata.outputs.archive_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install bootstrap runtime
        run: dnf install -y python3

      - name: Bootstrap Fedora dependencies
        run: ./devsh install --yes --deps-only

      - name: Compute release metadata
        id: metadata
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import tomllib
          from pathlib import Path

          cargo_workspace = tomllib.loads(Path("rust/Cargo.toml").read_text(encoding="utf-8"))
          version = cargo_workspace["workspace"]["package"]["version"]
          short_sha = os.environ["GITHUB_SHA"][:7]
          run_number = os.environ["GITHUB_RUN_NUMBER"]
          run_attempt = os.environ["GITHUB_RUN_ATTEMPT"]

          tag_name = f"v{version}-release.{run_number}.{run_attempt}"
          release_name = f"Pro Desk Shell v{version} release snapshot {run_number}.{run_attempt}"
          archive_name = f"pro-desk-shell-{version}-linux-x86_64-{short_sha}"

          print(f"version={version}")
          print(f"short_sha={short_sha}")
          print(f"tag_name={tag_name}")
          print(f"release_name={release_name}")
          print(f"archive_name={archive_name}")
          PY

      - name: Build release binary
        run: ./devsh build --build-dir build-release --build-type Release

      - name: Package release artifacts
        env:
          ARCHIVE_NAME: ${{ steps.metadata.outputs.archive_name }}
          RELEASE_NAME: ${{ steps.metadata.outputs.release_name }}
          TAG_NAME: ${{ steps.metadata.outputs.tag_name }}
        run: |
          mkdir -p dist/package
          install -D -m 0755 build-release/pro-desk-shell dist/package/pro-desk-shell
          install -D -m 0644 README.md dist/package/README.md
          install -D -m 0644 LICENSE dist/package/LICENSE

          tar -C dist/package -czf "dist/${ARCHIVE_NAME}.tar.gz" .
          sha256sum "dist/${ARCHIVE_NAME}.tar.gz" > "dist/${ARCHIVE_NAME}.sha256"

          cat <<EOF > dist/release-notes.md
          Automated release snapshot from the \`release\` branch.

          - Release: ${RELEASE_NAME}
          - Tag: ${TAG_NAME}
          - Commit: ${GITHUB_SHA}
          EOF

      - name: Upload release bundle
        uses: actions/upload-artifact@v6
        with:
          name: github-release-bundle
          if-no-files-found: error
          path: |
            dist/*.tar.gz
            dist/*.sha256
            dist/release-notes.md

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - bundle
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v5
        with:
          name: github-release-bundle
          path: dist

      - name: Publish release on GitHub
        id: publish_release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.bundle.outputs.release_name }}
          tag_name: ${{ needs.bundle.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          body_path: dist/release-notes.md
          files: |
            dist/*.tar.gz
            dist/*.sha256
          fail_on_unmatched_files: true
          overwrite_files: true
          generate_release_notes: true
          prerelease: true
          make_latest: false
